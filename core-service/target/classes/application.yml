server:
  port: 8081

spring:
  application:
    name: core-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow_db
    username: postgres
    password: postgrespassword
  flyway:
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: core-group
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.json.trusted.packages: com.payflow.commons.dto
        spring.json.use.type.headers: false
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.payflow.commons.dto.alert.PaymentAlertEvent
        max.poll.interval.ms: 300000
      listener:
        ack-mode: record
        retry:
          max-attempts: 3
          backoff:
            initial: 1000
            multiplier: 2
            max: 10000
      template:
        default-topic: payflow.payment.alerts

# JWT Configuration
jwt:
  secret: c2VjdXJlX3NlY3JldF9rZXlfZm9yX3BheWZsb3dfYXBwbGljYXRpb25fMjAyNA== # Base64 encoded secret key
  expiration: 86400000 # 24 hours in milliseconds

anti-fraud-service:
  url: http://localhost:8082

# Token compartilhado para autenticação service-to-service via header X-Internal-Token.
# Em produção use um secret forte gerenciado por secret manager.
internal-api:
  token: ${INTERNAL_API_TOKEN:dev-internal-shared-secret-change-me}


